<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How To Implement ChatGPT in Django</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#202123;
            color:white;
        }

        .header{
            background:#343541;
            text-align:center;
            padding:20px;
            font-size:28px;
            font-weight:bold;
            border-bottom:1px solid #555;
        }

        .chat-container{
            width:80%;
            max-width:900px;
            margin:30px auto;
            background:#343541;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 0 15px rgba(0,0,0,.5);
        }

        #chat-box{
            height:450px;
            overflow-y:auto;
            padding:20px;
            background:#444654;
        }

        .user{
            text-align:right;
            margin:15px;
        }

        .bot{
            text-align:left;
            margin:15px;
        }

        .bubble{
            display:inline-block;
            padding:12px 18px;
            border-radius:15px;
            max-width:70%;
        }

        .user .bubble{
            background:#10A37F;
        }

        .bot .bubble{
            background:#555;
        }

        .input-area{
            display:flex;
            padding:15px;
            background:#343541;
        }

        input{
            flex:1;
            padding:14px;
            font-size:16px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        button{
            margin-left:10px;
            padding:14px 22px;
            background:#10A37F;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0e8f70;
        }

    </style>
</head>

<body>

<div class="header">
    🤖 How To Implement ChatGPT in Django
</div>

<div class="chat-container">

    <div id="chat-box">

    {% for chat in chat_history %}

    <div class="user">
        <div class="bubble">
            {{ chat.user }}
        </div>
    </div>

    <div class="bot">
        <div class="bubble">
            {{ chat.bot }}
        </div>
    </div>

    {% endfor %}

</div>
<form method="GET" style="text-align:right; padding:10px;">
    <button type="submit" name="clear">
        🗑️ Clear Chat
    </button>
</form>

      

    <form method="POST" class="input-area">

    {% csrf_token %}

    <input
        type="text"
        name="message"
        placeholder="Ask anything..."
        required>

    <button type="submit">
        Send
    </button>

</form>

</div>

</body>
</html>
